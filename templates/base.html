<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block link %}{% endblock %}<link rel="stylesheet" href="../static/home.css">
    <title>{% block title %}Book Manager {% endblock %}</title>
</head>
<body>

    <nav>
        <div class="logo">The Book Nook</div>

        <div class="search-container">
            <form action="{{ url_for('search') }}" method="GET">
                <input type="text" placeholder="Search by title, author, or ISBN..." name="q" value= {{ query }}>
                <button type="submit">🔍</button>
            </form>
        </div>

        <div class="nav-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('my_books') }}">My Books</a>
            <a href="{{ url_for('profile') }}">Profile</a>
            <a href="{{ url_for('logout') }}" style="color: #ffbba7;">Logout</a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
