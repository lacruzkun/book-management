<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/login.css">
    <title>Signup | The Book Nook</title>
</head>
<body>

    <div class="login-container">
        <h1>The Book Nook</h1>
        <p>Log in to your library</p>

        <form class="signup" action="{{ url_for('signup') }}" method="POST">
            <div class="form-group">
                <label for="username">Email or Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="re-enter password">Password Again</label>
                <input type="password" id="repassword" name="repassword" required>
            </div>

            <div class="form-group">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember" style="display: inline; font-weight: normal;">Remember me</label>
            </div>

            <button type="submit">Sign Up</button>
        </form>

    </div>
    <div id="toast" style="
      position: fixed;
      bottom: 30px;
      right: 30px;
      background-color: #382110; /* Dark brown from your nav */
      color: #f4f1ea;            /* Cream text */
      padding: 16px 24px;
      border-radius: 4px;        /* Slightly sharper corners for a bookish look */
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
      border-left: 5px solid #764132; /* Terracotta accent 'bookmark' */
      display: none;             /* Hidden by default */
      z-index: 9999;
      min-width: 250px;
      letter-spacing: 0.5px;
    ">
    </div>

</body>

<script>
function showToast(message) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.style.display = "block";

    setTimeout(() => {
        toast.style.display = "none";
    }, 3000); // disappears after 3 seconds
}

$(document).on("submit", '.signup', function(e) {
    e.preventDefault();
    const form = $(this);
    const username = form.find('input[name=username]').val()
    const password = form.find('input[name=password]').val()
    const repassword = form.find('input[name=repassword]').val()
    $.ajax({
        type: 'POST',
        url: '/signup',
        data: {
            username: username,
            password: password,
            repassword: repassword,
        },
        success: function(response)
        {
            const message = `Book "${bookName}" added successfully`;
            showToast(message);}
    });
});
</script>
</html>
