<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/login.css">
    <title>Signup | The Book Nook</title>
</head>
<body>

    <div class="login-container">
        <h1>The Book Nook</h1>
        <p>Log in to your library</p>

        <form class="signup" method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="username">Name</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="re-enter password">Confirm Password</label>
                <input type="password" id="repassword" name="repassword" oninput="checkMatch()" required>
                <p id="error" style="color:red;"></p>
            </div>

            <div class="form-group">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember" style="display: inline; font-weight: normal;">Remember me</label>
            </div>

            <button type="submit">Sign Up</button>
        </form>

    </div>

</body>

<script>
    function checkMatch() {
        const password = document.getElementById("password").value;
        const repassword = document.getElementById("repassword").value;
        const error = document.getElementById("error");

        if (repassword.length > 0 && password !== repassword) {
            error.textContent= "Password do not match";
        }else {
            error.textContent= "";
        }
    }

</script>
</html>
